name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate HTML & assets
        run: npm test

      - name: Check Sentry integration placeholder
        run: |
          if ! grep -q 'initSentry' src/js/script.js; then
            echo '::error::Sentry initialization not found in src/js/script.js'
            exit 1
          fi
